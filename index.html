<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;font-size:14px}
:root{
  --sidebar:#1A1A2E;--bg:#FAFAF8;--card:#FFFFFF;--border:#E5E7EB;
  --text:#111827;--muted:#6B7280;--accent:#4F46E5;--accent-light:#EEF2FF;
  --red:#DC2626;--red-bg:#FEF2F2;--yellow:#CA8A04;--yellow-bg:#FEFCE8;
  --blue:#2563EB;--blue-bg:#EFF6FF;--green:#16A34A;--green-bg:#F0FDF4;
}
#hd-root{height:100vh}
.app{display:flex;height:100vh;background:var(--bg);overflow:hidden}
/* Sidebar */
.sidebar{width:220px;flex-shrink:0;background:var(--sidebar);display:flex;flex-direction:column;height:100vh;position:fixed;top:0;left:0;z-index:100}
.sb-logo{padding:18px 20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sb-logo-icon{width:36px;height:32px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sb-logo span{font-size:16px;font-weight:800;color:#fff}
.sb-nav{padding:10px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#94A3B8;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;user-select:none}
.nav-item:hover{color:#fff;background:rgba(255,255,255,0.06)}
.nav-item.active{color:#fff;background:#4F46E5}
.nav-item svg{width:15px;height:15px;flex-shrink:0}
.sb-footer{padding:14px 20px;border-top:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px}
.user-av{width:30px;height:30px;border-radius:50%;background:#4F46E5;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0}
.user-nm{font-size:12px;font-weight:600;color:#fff}
.user-rl{font-size:10px;color:#64748B;text-transform:uppercase;letter-spacing:.4px}
/* Main */
.main{margin-left:220px;flex:1;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:50}
.content{padding:24px}
/* Components */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:#4F46E5;color:#fff}.btn-primary:hover{background:#4338CA}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:#F3F4F6}
.btn-danger{background:var(--red-bg);color:var(--red)}
.btn-sm{padding:5px 12px;font-size:11px}
.input{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 12px;font-size:13px;outline:none;font-family:inherit;width:100%}
.input:focus{border-color:#4F46E5;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.label{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;display:block}
select.input option{background:#fff}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tag{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:11px;background:#EEF2FF;color:#4F46E5;margin:2px}
/* Tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 14px;text-align:left;font-size:11px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);background:var(--bg)}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#F9FAFB}
/* Kanban */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.kan-col{min-width:190px;flex:0 0 190px;background:#F3F4F6;border-radius:12px;border:1px solid var(--border);padding:12px}
.kan-card{background:#fff;border-radius:8px;padding:12px;cursor:pointer;border:1px solid var(--border);margin-bottom:8px;transition:border-color .15s}
.kan-card:hover{border-color:#4F46E5;box-shadow:0 2px 8px rgba(79,70,229,.08)}
/* Breadcrumb */
.bc{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-bottom:16px}
.bc a{color:#4F46E5;cursor:pointer}.bc a:hover{text-decoration:underline}
/* Login */
.login-wrap{position:fixed;inset:0;background:#1A1A2E;display:flex;align-items:center;justify-content:center}
.login-card{background:#fff;border-radius:16px;padding:40px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:14px;padding:28px;width:520px;max-width:100%;max-height:85vh;overflow-y:auto}
/* Pipeline bar */
.pbar{display:flex;height:8px;border-radius:20px;overflow:hidden;background:#F3F4F6}
.pbar-s{height:100%}
/* Role card */
.role-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:28px}
.role-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:all .15s}
.role-card:hover{border-color:#4F46E5;box-shadow:0 4px 14px rgba(79,70,229,.1)}
/* Candidate cards */
.cand-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.cand-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .15s}
.cand-card:hover{border-color:#4F46E5;box-shadow:0 2px 8px rgba(0,0,0,.06)}
/* Feedback */
.fb-round{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.fb-submitted{background:#fff;border-radius:6px;padding:10px;margin-bottom:8px;border:1px solid var(--border);font-size:12px}
/* Utils */
.flex-between{display:flex;justify-content:space-between;align-items:center}
.divider{height:1px;background:var(--border);margin:16px 0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px}
/* Bell */
.bell-wrap{position:relative;display:flex;align-items:center}
.bell-btn{background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;color:var(--muted);display:flex;align-items:center;position:relative}
.bell-btn:hover{background:var(--bg)}
.bell-badge{position:absolute;top:2px;right:2px;min-width:16px;height:16px;background:#DC2626;border-radius:10px;color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px;border:2px solid #fff}
.bell-dd{position:absolute;top:calc(100% + 8px);right:0;width:320px;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:200;overflow:hidden}
.bell-dd-head{padding:12px 16px;font-size:12px;font-weight:700;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.bell-notif{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.bell-notif:hover{background:#F9FAFB}
.bell-notif:last-child{border-bottom:none}
</style>

let _tt;
function toast(msg,type='ok'){
  let t=document.getElementById('hd-toast');
  if(!t){t=document.createElement('div');t.id='hd-toast';t.style.cssText='position:fixed;bottom:20px;right:20px;z-index:9999;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;max-width:300px;transition:opacity .3s';document.body.appendChild(t);}
  const ok=type==='ok';
  t.style.background=ok?'#F0FDF4':'#FEF2F2';
  t.style.border=`1px solid ${ok?'#16A34A':'#DC2626'}`;
  t.style.color=ok?'#16A34A':'#DC2626';
  t.style.opacity='1';
  t.textContent=(ok?'✓ ':'✕ ')+msg;
  clearTimeout(_tt);_tt=setTimeout(()=>t.style.opacity='0',3500);
}

function modal(html){
  let m=document.getElementById('hd-modal');
  if(!m){m=document.createElement('div');m.id='hd-modal';m.className='modal-bg';m.onclick=e=>{if(e.target===m)closeModal();};document.body.appendChild(m);}
  m.innerHTML=`<div class="modal">${html}</div>`;
}

async function doLogin(){

  const err=document.getElementById('li-err');
  const btn=document.getElementById('li-btn');

  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});

  localStorage.setItem('hd_u',JSON.stringify(S.user));

}

function renderDash(){
  const mc=document.getElementById('mc');

  const tomorrow=new Date(Date.now()+86400000).toISOString().split('T')[0];
  const todaySched=schedule.filter(s=>s.date===today).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const tomorrowSched=schedule.filter(s=>s.date===tomorrow).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const stats=[
    {l:'Total Candidates',v:candidates.length,i:'👥',c:'#4F46E5'},
    {l:'Active Pipeline',v:candidates.filter(c=>!['red','green'].includes(c.status)).length,i:'⚡',c:'#2563EB'},
    {l:'In Process',v:candidates.filter(c=>c.status==='blue').length,i:'🔄',c:'#CA8A04'},
    {l:'Selected',v:candidates.filter(c=>c.stage==='Offer Letter Rolled Out').length,i:'🎉',c:'#16A34A'},
  ];

  function schedCard(s){
    const fmt12=t=>{if(!t)return'';const[h,m]=t.split(':');const hh=+h;return`${hh%12||12}:${m} ${hh>=12?'PM':'AM'}`;}
    return`<div class="flex-between" style="padding:12px;border-radius:10px;background:#F9FAFB;border:1px solid var(--border);margin-bottom:8px;cursor:pointer" onclick="openCandFromSchedule('${s.cid}')">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#4F46E5,#7C3AED);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0">${(s.cname||'?')[0]}</div>
        <div>
          <div style="font-size:13px;font-weight:700">${s.cname}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${s.role} · ${s.round||s.stage}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:1px">🕐 ${fmt12(s.time)||'—'} &nbsp;·&nbsp; 👤 ${s.interviewer}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <span class="badge" style="background:${s.status==='Done'?'#F0FDF4':'#FEFCE8'};color:${s.status==='Done'?'#16A34A':'#CA8A04'}">${s.status}</span>
        ${s.status!=='Done'?`<button class="btn btn-sm" style="background:#F0FDF4;color:#16A34A;border:none" onclick="event.stopPropagation();doneSchedule('${s.id}')">✓ Done</button>`:''}
      </div>
    </div>`;
  }

  mc.innerHTML=`
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px">
    ${stats.map(s=>`
    <div class="card" style="display:flex;align-items:center;gap:14px;padding:16px">
      <div style="width:42px;height:42px;border-radius:10px;background:${s.c}18;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${s.i}</div>
      <div><div style="font-size:22px;font-weight:800">${s.v}</div><div style="font-size:11px;color:var(--muted)">${s.l}</div></div>
    </div>`).join('')}
  </div>

  ${(todaySched.length||tomorrowSched.length)?`
  <div class="card" style="margin-bottom:24px;border-left:4px solid #4F46E5">
    <div class="flex-between" style="margin-bottom:16px">
      <div style="font-size:14px;font-weight:700">📅 Interview Schedule</div>
      <span style="font-size:12px;color:var(--muted)">${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}</span>
    </div>
    ${todaySched.length?`
      <div style="font-size:11px;font-weight:700;color:#4F46E5;letter-spacing:.5px;margin-bottom:8px;text-transform:uppercase">Today</div>
      ${todaySched.map(schedCard).join('')}
    `:''}
    ${tomorrowSched.length?`
      <div style="font-size:11px;font-weight:700;color:#CA8A04;letter-spacing:.5px;margin-bottom:8px;margin-top:${todaySched.length?'14px':'0'};text-transform:uppercase">Tomorrow</div>
      ${tomorrowSched.map(schedCard).join('')}
    `:''}
    ${!todaySched.length&&!tomorrowSched.length?`<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">No interviews scheduled today or tomorrow</div>`:''}
  </div>`:''}

  <div style="font-size:15px;font-weight:700;margin-bottom:14px">Pipeline by Role</div>
  <div class="role-cards">
    ${openRoles.filter(r=>r.status==='open').map(role=>{
      const rc=candidates.filter(c=>c.rid===role.id);
      const cnt={};STAGES.forEach(s=>{cnt[s]=rc.filter(c=>c.stage===s&&c.status!=='red').length;});
      const tot=rc.filter(c=>c.status!=='red').length||1;
      const isAdm=S.user?.role==='admin';
      return`<div class="role-card" onclick="${isAdm?`goRole('${role.id}')`:''}" style="${isAdm?'':'cursor:default'}">
        <div class="flex-between" style="margin-bottom:12px">
          <div>
            <div style="font-size:14px;font-weight:700;margin-bottom:2px">${role.title}</div>
            <div style="font-size:11px;color:var(--muted)">${role.dept} · ${rc.length} candidate${rc.length!==1?'s':''}</div>
          </div>
          <span class="badge" style="background:#EEF2FF;color:#4F46E5">${rc.filter(c=>!['red','green'].includes(c.status)).length} active</span>
        </div>
        <div class="pbar" style="margin-bottom:10px">
          ${STAGES.map(s=>{const w=Math.round((cnt[s]||0)/tot*100);return w>0?`<div class="pbar-s" style="width:${w}%;background:${STAGE_C[s]}"></div>`:''}).join('')}
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          ${STAGES.filter(s=>cnt[s]>0).map(s=>`<span style="font-size:10px;color:${STAGE_C[s]};font-weight:600">● ${cnt[s]} ${s}</span>`).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function doneSchedule(id){schedule=schedule.map(s=>s.id===id?{...s,status:'Done'}:s);localStorage.setItem('hd_schedule',JSON.stringify(schedule));renderDash();toast('Marked done');}

function openCandFromSchedule(cid){

    S.page='pipeline';S.pipRid=c.rid;S.pipCid=cid;

    document.getElementById('ni-pipeline')?.classList.add('active');
    document.getElementById('page-title').textContent='Pipeline';

    S.page='applications';S.view='profile';S.cid=cid;S.rid=c.rid;
    document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
    document.getElementById('ni-applications')?.classList.add('active');
    document.getElementById('page-title').textContent='Applications';

}

        <select id="si-interviewer" class="input">

function saveSchedule(cid){
  const c=candOf(cid);if(!c)return;
  const date=document.getElementById('si-date').value;
  const time=document.getElementById('si-time').value;
  const round=document.getElementById('si-round').value;
  const interviewer=document.getElementById('si-interviewer').value;
  if(!date){toast('Please select a date','err');return;}
  const role=roleOf(c.rid);
  // Remove existing non-done entry for this candidate
  schedule=schedule.filter(s=>!(s.cid===cid&&s.status!=='Done'));
  schedule.push({id:'s'+Date.now(),cid,cname:c.name,role:role?.title||'',interviewer,date,time,round,status:'Scheduled'});
  localStorage.setItem('hd_schedule',JSON.stringify(schedule));
  closeModal();
  toast('Interview scheduled for '+c.name);
  if(S.page==='dashboard')renderDash();
}

function updCand(id,field,val){
  candidates=candidates.map(c=>c.id===id?{...c,[field]:val}:c);
  localStorage.setItem('hd_candidates',JSON.stringify(candidates));
  if(field==='status'||field==='stage')renderProfile();
}
function submitFB(cid,stage){
  const key=`fbt-${cid}-${stage.replace(/ /g,'_')}`;
  const text=document.getElementById(key)?.value?.trim();
  if(!text){toast('Enter feedback','err');return;}

  const fbList=JSON.parse(localStorage.getItem('hd_feedback')||'[]');
  fbList.push({id:'f'+Date.now(),cid,stage,reviewer:S.user?.name||'Unknown',text,on:new Date().toISOString().split('T')[0]});
  localStorage.setItem('hd_feedback',JSON.stringify(fbList));
  feedback=fbList;

  if(S.user?.role==='viewer'){
    const c=candidates.find(x=>x.id===cid);
    const roleName=openRoles.find(r=>r.id===c?.rid)?.title||'';
    const notifList=JSON.parse(localStorage.getItem('hd_notifications')||'[]');
    notifList.unshift({id:'n'+Date.now(),cid,cname:c?.name||'',role:roleName,reviewer:S.user.name,stage,read:false,at:new Date().toISOString()});
    localStorage.setItem('hd_notifications',JSON.stringify(notifList));
    notifications=notifList;
    toast('Feedback submitted — admin notified ✓');
  } else {
    toast('Feedback saved');
  }

  if(S.page==='pipeline')renderPipeline();else renderProfile();
}

// ── BELL / NOTIFICATIONS ──────────────────────────────────────────
function updateBell(){
  if(S.user?.role!=='admin')return;
  // Always read fresh from localStorage — never trust in-memory array alone
  notifications=JSON.parse(localStorage.getItem('hd_notifications')||'[]');
  const unread=notifications.filter(n=>!n.read).length;
  const badge=document.getElementById('bell-badge');
  if(badge){badge.style.display=unread>0?'flex':'none';badge.textContent=unread>9?'9+':String(unread);}
}
// Cross-tab sync: reload data when another tab makes changes
window.addEventListener('storage',e=>{
  if(e.key==='hd_notifications')updateBell();
  if(e.key==='hd_candidates'&&e.newValue)candidates=JSON.parse(e.newValue);
  if(e.key==='hd_schedule'&&e.newValue)schedule=JSON.parse(e.newValue);
});
function toggleBell(e){
  e?.stopPropagation();
  const dd=document.getElementById('bell-dd');
  if(!dd)return;
  if(dd.style.display==='none'){
    // Reload fresh before opening dropdown
    notifications=JSON.parse(localStorage.getItem('hd_notifications')||'[]');
    const unread=notifications.filter(n=>!n.read);
    dd.innerHTML=`
      <div class="bell-dd-head">
        <span>Notifications</span>
        ${unread.length?`<span onclick="clearAllNotif()" style="font-size:11px;color:#4F46E5;cursor:pointer;font-weight:600">Clear all</span>`:''}
      </div>
      ${notifications.length===0?`<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">No notifications yet</div>`
        :notifications.map(n=>`
      <div class="bell-notif" onclick="openNotif('${n.id}')" style="background:${n.read?'#fff':'#F5F3FF'}">
        <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px">${n.reviewer} submitted feedback</div>
        <div style="font-size:11px;color:var(--muted)">${n.cname} · ${n.role} · ${n.stage}</div>
        <div style="font-size:10px;color:#9CA3AF;margin-top:3px">${new Date(n.at).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</div>
      </div>`).join('')}`;
    dd.style.display='block';
    document.addEventListener('click',closeBellOnOut,{once:true});
  } else {
    dd.style.display='none';
  }
}
function closeBellOnOut(){const dd=document.getElementById('bell-dd');if(dd)dd.style.display='none';}
function openNotif(nid){
  notifications=JSON.parse(localStorage.getItem('hd_notifications')||'[]');
  const n=notifications.find(x=>x.id===nid);
  if(!n)return;
  document.getElementById('bell-dd').style.display='none';
  S.page='applications';S.view='profile';S.cid=n.cid;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('ni-applications')?.classList.add('active');
  document.getElementById('page-title').textContent='Applications';
  renderPage();
  setTimeout(()=>{const el=document.getElementById('fb-section');if(el)el.scrollIntoView({behavior:'smooth'});},100);
}
function clearAllNotif(){notifications.forEach(n=>n.read=true);localStorage.setItem('hd_notifications',JSON.stringify(notifications));updateBell();document.getElementById('bell-dd').style.display='none';}

// ── PIPELINE ──────────────────────────────────────────────────────
function renderPipeline(){
  if(S.pipCid) return renderPipelineProfile();
  if(S.pipRid) return renderPipelineCands();
  feedback=JSON.parse(localStorage.getItem('hd_feedback')||'[]');
  const active=candidates.filter(c=>['yellow','blue'].includes(c.status));

  // Build role cards
  const roleRows=openRoles.map(r=>{
    const rc=active.filter(c=>c.rid===r.id);
    if(!rc.length)return null;
    const fbCount=rc.reduce((s,c)=>s+feedback.filter(f=>f.cid===c.id).length,0);
    const stageBreakdown=STAGES.map(s=>{const n=rc.filter(c=>c.stage===s).length;return n?`<span style="font-size:10px;color:${STAGE_C[s]};font-weight:600">● ${n} ${s}</span>`:null;}).filter(Boolean);
    return`<div class="role-card" onclick="S.pipRid='${r.id}';renderPipeline()" style="cursor:pointer">
      <div class="flex-between" style="margin-bottom:10px">
        <div>
          <div style="font-size:14px;font-weight:700">${r.title}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${r.dept}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <span class="badge" style="background:#EEF2FF;color:#4F46E5">${rc.length} candidate${rc.length!==1?'s':''}</span>
          ${fbCount?`<span class="badge" style="background:#F0FDF4;color:#16A34A">${fbCount} feedback note${fbCount!==1?'s':''}</span>`:''}
        </div>
      </div>
      <div class="pbar" style="margin-bottom:8px">
        ${STAGES.map(s=>{const n=rc.filter(c=>c.stage===s).length;const w=Math.round(n/rc.length*100);return w>0?`<div class="pbar-s" style="width:${w}%;background:${STAGE_C[s]}"></div>`:''}).join('')}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">${stageBreakdown.join('')}</div>
    </div>`;
  }).filter(Boolean);

  document.getElementById('mc').innerHTML=`
  <div style="font-size:18px;font-weight:700;margin-bottom:4px">Pipeline</div>
  <div style="font-size:13px;color:var(--muted);margin-bottom:20px">${active.length} active candidates across ${roleRows.length} role${roleRows.length!==1?'s':''}</div>
  ${roleRows.length?`<div class="role-cards">${roleRows.join('')}</div>`:`<div class="empty">No active candidates in pipeline</div>`}`;
}

      <td>${sBadge(c.status)}</td>
      <td onclick="event.stopPropagation()">${c.cv?`<a href="${c.cv}" target="_blank" style="color:#4F46E5;font-size:12px">📄 View</a>`:'<span style="color:var(--muted);font-size:12px">—</span>'}</td>
      <td onclick="event.stopPropagation()">${c.li?`<a href="${c.li}" target="_blank" style="color:#4F46E5;font-size:12px">💼 View</a>`:'<span style="color:var(--muted);font-size:12px">—</span>'}</td>
      ${isAdmin?`<td style="font-size:12px">${c.cctc||'—'}</td><td style="font-size:12px">${c.ectc||'—'}</td><td style="font-size:12px">${c.notice||'—'}</td>`:''}
      <td onclick="event.stopPropagation()"><div style="display:flex;align-items:center;gap:6px">
        ${cnt>0?`<span class="badge" style="background:#EEF2FF;color:#4F46E5">${cnt} note${cnt>1?'s':''}</span>`:'<span style="font-size:11px;color:var(--muted)">No feedback</span>'}
        <button class="btn btn-sm" style="background:#EEF2FF;color:#4F46E5;border:none" onclick="showFBModal('${c.id}')">+ Add</button>
        <button class="btn btn-sm" style="background:#EFF6FF;color:#2563EB;border:none" onclick="scheduleInterview('${c.id}')">📅</button>
      </div></td>
    </tr>`;
  }).join('')}
  </tbody></table></div>`:`<div class="empty card">No active candidates for this role</div>`}`;
}

function setPipStage(cid,stage){candidates=candidates.map(c=>c.id===cid?{...c,stage}:c);localStorage.setItem('hd_candidates',JSON.stringify(candidates));renderPipelineCands();toast('Stage updated');}
function openPipProfile(cid){S.pipCid=cid;renderPipeline();}
function closePipProfile(){S.pipCid=null;renderPipeline();}

function renderPipelineProfile(){
  feedback=JSON.parse(localStorage.getItem('hd_feedback')||'[]');
  const c=candidates.find(x=>x.id===S.pipCid);if(!c){closePipProfile();return;}
  const isAdmin=S.user?.role==='admin';
  const role=roleOf(c.rid);
  const cfb=feedback.filter(f=>f.cid===c.id);

  document.getElementById('mc').innerHTML=`
  <div class="bc" style="margin-bottom:20px">
    <a onclick="S.pipRid=null;S.pipCid=null;renderPipeline()">Pipeline</a>
    <span style="color:#D1D5DB">›</span>
    <a onclick="S.pipCid=null;renderPipeline()">${roleOf(c.rid)?.title||'Role'}</a>
    <span style="color:#D1D5DB">›</span>
    <span>${c.name}</span>
  </div>

  <!-- Header card -->
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#4F46E5,#7C3AED);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:800;flex-shrink:0">${ini(c.name)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:18px;font-weight:800;color:var(--text)">${c.name}</div>
        <div style="font-size:13px;color:var(--muted);margin-top:2px">${role?.title||''}${isAdmin&&c.yoe?' · '+c.yoe+' yrs':''}</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        ${isAdmin?stBadge(c.stage):''}
        ${isAdmin?sBadge(c.status):''}
        ${c.cv?`<a href="${c.cv}" target="_blank" class="btn btn-secondary btn-sm" style="text-decoration:none">📄 Resume</a>`:'<span style="font-size:12px;color:var(--muted)">No resume</span>'}
        ${c.li?`<a href="${c.li}" target="_blank" class="btn btn-secondary btn-sm" style="text-decoration:none">💼 LinkedIn</a>`:''}
      </div>
    </div>
    ${isAdmin?`
    <div class="divider"></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px">
      ${[['Email',c.email],['Phone',c.phone],['Current CTC',c.cctc],['Expected CTC',c.ectc],['Notice Period',c.notice]].map(([l,v])=>v?`
      <div><div class="label">${l}</div><div style="font-size:13px;font-weight:500">${v}</div></div>`:'').join('')}
    </div>`:''}
  </div>

  <!-- Feedback by round -->
  <div style="font-size:15px;font-weight:700;margin-bottom:14px">Interview Feedback</div>
  ${FB_STAGES.map(stage=>{
    const sfb=cfb.filter(f=>f.stage===stage);
    const isCurrent=c.stage===stage;
    return`
    <div class="card" style="margin-bottom:12px;border-left:3px solid ${isCurrent?STAGE_C[stage]:'#E5E7EB'}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${sfb.length?'12px':'0'}">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:8px;height:8px;border-radius:50%;background:${isCurrent?STAGE_C[stage]:'#D1D5DB'};flex-shrink:0"></div>
          <span style="font-size:13px;font-weight:700;color:${isCurrent?'var(--text)':'var(--muted)'}">${stage}</span>
          ${isCurrent?`<span style="font-size:10px;font-weight:700;color:${STAGE_C[stage]};background:${STAGE_C[stage]}18;padding:2px 8px;border-radius:20px">Current Stage</span>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          ${sfb.length?`<span class="badge" style="background:#EEF2FF;color:#4F46E5">${sfb.length} note${sfb.length>1?'s':''}</span>`:''}
          <button class="btn btn-sm" style="background:#F9FAFB;color:#4F46E5;border:1px solid #E5E7EB" onclick="event.stopPropagation();showFBModalStage('${c.id}','${stage}')">+ Add</button>
        </div>
      </div>
      ${sfb.length?sfb.map(f=>`
      <div class="fb-submitted" style="margin-bottom:8px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:24px;height:24px;border-radius:50%;background:#4F46E5;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700">${ini(f.reviewer)}</div>
            <span style="font-size:12px;font-weight:600">${f.reviewer}</span>
          </div>
          <span style="font-size:10px;color:var(--muted)">${f.on}</span>
        </div>
        <div style="font-size:13px;color:var(--text);line-height:1.6;padding-left:32px">${f.text}</div>
      </div>`).join(''):`<div style="font-size:12px;color:var(--muted);padding:4px 0">No feedback yet for this round</div>`}
    </div>`;
  }).join('')}`;
}

function showFBModalStage(cid,stage){
  const c=candOf(cid);if(!c)return;
  modal(`<div style="font-size:16px;font-weight:700;margin-bottom:4px">Add Feedback</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:18px">${c.name} · ${stage}</div>
    <input type="hidden" id="fb-st" value="${stage}">
    <div><label class="label">Your Assessment *</label><textarea class="input" id="fb-tx" rows="5" placeholder="Write your assessment…" style="resize:vertical"></textarea></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitFBPip('${cid}','${stage}')">Submit</button>
    </div>`);
}

function submitFBPip(cid,stage){
  const text=document.getElementById('fb-tx')?.value?.trim();
  if(!text){toast('Enter feedback','err');return;}
  const fbList=JSON.parse(localStorage.getItem('hd_feedback')||'[]');
  fbList.push({id:'f'+Date.now(),cid,stage,reviewer:S.user?.name||'Unknown',text,on:new Date().toISOString().split('T')[0]});
  localStorage.setItem('hd_feedback',JSON.stringify(fbList));
  feedback=fbList;
  if(S.user?.role==='viewer'){
    const c=candidates.find(x=>x.id===cid);
    const roleName=openRoles.find(r=>r.id===c?.rid)?.title||'';
    const notifList=JSON.parse(localStorage.getItem('hd_notifications')||'[]');
    notifList.unshift({id:'n'+Date.now(),cid,cname:c?.name||'',role:roleName,reviewer:S.user.name,stage,read:false,at:new Date().toISOString()});
    localStorage.setItem('hd_notifications',JSON.stringify(notifList));
    notifications=notifList;
    toast('Feedback submitted — admin notified ✓');
  } else {
    toast('Feedback saved');
  }
  closeModal();
  renderPipelineProfile();
}

// ── ADD CANDIDATE ─────────────────────────────────────────────────
function showAddCand(preRid=''){
  modal(`<div style="font-size:16px;font-weight:700;margin-bottom:4px">Add Candidate</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:18px">Add a new candidate to the pipeline</div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="grid2">
        <div><label class="label">Full Name *</label><input class="input" id="ac-n" placeholder="Full name"></div>
        <div><label class="label">Role *</label><select class="input" id="ac-r">${openRoles.filter(r=>r.status==='open').map(r=>`<option value="${r.id}"${preRid===r.id?' selected':''}>${r.title}</option>`).join('')}</select></div>
        <div><label class="label">Years of Experience</label><input class="input" id="ac-y" placeholder="e.g. 4"></div>
        <div><label class="label">Initial Status</label><select class="input" id="ac-s"><option value="yellow">Pipeline (Yellow)</option><option value="blue">In Process (Blue)</option></select></div>
      </div>
      <div><label class="label">LinkedIn URL</label><input class="input" id="ac-l" placeholder="https://linkedin.com/in/…"></div>
      <div><label class="label">Resume URL</label><input class="input" id="ac-c" placeholder="https://drive.google.com/…"></div>
      <div><label class="label">Skills / Tags</label><input class="input" id="ac-sk" placeholder="React, Node.js, AI…"></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitAddCand()">Add Candidate</button>
    </div>`);
}
function submitAddCand(){
  const name=document.getElementById('ac-n')?.value.trim();
  if(!name){toast('Name required','err');return;}
  candidates.push({id:String(Date.now()),rid:document.getElementById('ac-r')?.value,name,yoe:document.getElementById('ac-y')?.value||'',skills:document.getElementById('ac-sk')?.value||'',li:document.getElementById('ac-l')?.value||'',cv:document.getElementById('ac-c')?.value||'',email:'',phone:'',cctc:'',ectc:'',notice:'',status:document.getElementById('ac-s')?.value||'yellow',stage:'Screening',added:new Date().toISOString().split('T')[0]});
  localStorage.setItem('hd_candidates',JSON.stringify(candidates));
  closeModal();toast(name+' added to pipeline');
  renderPage();
}

// ── FEEDBACK MODAL ────────────────────────────────────────────────
function showFBModal(cid){
  const c=candOf(cid);if(!c)return;
  modal(`<div style="font-size:16px;font-weight:700;margin-bottom:4px">Add Interview Feedback</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:18px">${c.name} · ${roleOf(c.rid)?.title||''}</div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div><label class="label">Round *</label><select class="input" id="fb-st">${FB_STAGES.map(s=>`<option value="${s}"${s===c.stage&&FB_STAGES.includes(c.stage)?' selected':''}>${s}</option>`).join('')}</select></div>
      <div><label class="label">Feedback *</label><textarea class="input" id="fb-tx" rows="4" placeholder="Your assessment…" style="resize:vertical"></textarea></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitFBModal('${cid}')">Submit</button>
    </div>`);
}
function submitFBModal(cid){
  const text=document.getElementById('fb-tx')?.value?.trim();
  const stage=document.getElementById('fb-st')?.value;
  if(!text){toast('Enter feedback','err');return;}

  // Save feedback
  const fbList=JSON.parse(localStorage.getItem('hd_feedback')||'[]');
  fbList.push({id:'f'+Date.now(),cid,stage,reviewer:S.user?.name||'Unknown',text,on:new Date().toISOString().split('T')[0]});
  localStorage.setItem('hd_feedback',JSON.stringify(fbList));
  feedback=fbList;

  // Create notification for admin (viewer only)
  if(S.user?.role==='viewer'){
    const c=candidates.find(x=>x.id===cid);
    const roleName=openRoles.find(r=>r.id===c?.rid)?.title||'';
    const notifList=JSON.parse(localStorage.getItem('hd_notifications')||'[]');
    notifList.unshift({id:'n'+Date.now(),cid,cname:c?.name||'',role:roleName,reviewer:S.user.name,stage,read:false,at:new Date().toISOString()});
    localStorage.setItem('hd_notifications',JSON.stringify(notifList));
    notifications=notifList;
    toast('Feedback submitted — admin notified ✓');
  } else {
    toast('Feedback submitted');
  }

  closeModal();
  if(S.page==='applications'&&S.view==='profile')renderProfile();
  else if(S.page==='pipeline')renderPipeline();
}


// ── INIT ──────────────────────────────────────────────────────────
sb.auth.getSession().then(({data:{session}})=>{
  if(session){
    const meta=session.user.user_metadata||{};
    S.user={role:meta.role||'viewer',name:meta.name||session.user.email.split('@')[0],email:session.user.email};
    localStorage.setItem('hd_u',JSON.stringify(S.user));
    renderApp();
  }else{
    S.user=null;localStorage.removeItem('hd_u');renderLogin();
  }
});
</script>
